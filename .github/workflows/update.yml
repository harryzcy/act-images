name: Update

on:
  schedule:
    - cron: "0 2,17 * * *"
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  release-number:
    name: Package Version Update
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update versions
        run: |
          python scripts/update.py
          python scripts/generate_readme.py

      # Using a GitHub App token to create the pull request,
      # so that the PR will trigger the workflows.
      # The workflows will not be triggered by "github-actions" user.
      # See https://github.com/peter-evans/create-pull-request/issues/48.
      - uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        if: github.event_name != 'push'
        id: generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: github.event_name != 'push'
        id: cpr
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "[chore] Update package versions"
          title: "Update package versions"
          labels: "dependencies"
          add-paths: "images/ubuntu"
